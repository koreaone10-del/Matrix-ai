name: بناء Chibani Lotfi AI

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

env:
  SOURCE_HTML: matrix-ai.html
  APP_NAME: "Chibani Lotfi AI"
  APP_ID: com.chibanilotfi.ai

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: تجهيز ملفات الويب
        run: |
          mkdir -p www
          cp "$SOURCE_HTML" www/index.html
          
      - name: تثبيت Capacitor ومولد الأيقونات
        run: |
          [ -f package.json ] || npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install -D @capacitor/assets

      # الحل الجذري: إنشاء ملف إعدادات بصيغة JSON بدلاً من TS لتفادي أخطاء بيئة GitHub
      - name: إنشاء إعدادات Capacitor الآمنة
        run: |
          cat <<EOF > capacitor.config.json
          {
            "appId": "${APP_ID}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF

      - name: إضافة منصّة أندرويد
        run: npx cap add android

      - name: توليد أيقونة التطبيق الخارجية (اللوغو)
        run: |
          if [ -f "logo.png" ]; then
            mkdir -p assets
            cp logo.png assets/icon.png
            cp logo.png assets/splash.png
            npx @capacitor/assets generate --android
          else
            echo "⚠️ ملف logo.png غير موجود، سيتم استخدام الأيقونة الافتراضية."
          fi

      - name: مزامنة ملفات الويب داخل مشروع أندرويد
        run: npx cap sync android

      - name: إصلاح تعارض إصدارات Kotlin
        working-directory: android
        run: |
          cat <<EOF >> build.gradle

          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-provider: basic

      - name: ترقيم الإصدار تلقائياً
        working-directory: android
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.0.${{ github.run_number }}\"/" app/build.gradle

      - name: بناء Debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: تجميع ملفات APK النهائية
        run: |
          mkdir -p release-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk "release-apk/ChibaniLotfiAI-build${{ github.run_number }}.apk"

      - name: نشر GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Chibani Lotfi AI — أحدث بناء (#${{ github.run_number }})"
          body: |
            📲 حمّل تطبيق **Chibani Lotfi AI 🇩🇿** بالأسفل وثبّته على هاتفك.
            - تم تحديث الاسم والأيقونة الخارجية بنجاح.
          files: release-apk/*.apk
